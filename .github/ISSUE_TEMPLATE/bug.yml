name: Bug report
description: Report reproducible incorrect behavior
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include secrets or private payloads. Report vulnerabilities through the private Security Advisory link instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest safe sequence of commands or repository.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node, pnpm, Postgres, container runtime, and topology.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Remove credentials, payloads, prompts, and private URLs.

