version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Australia/Melbourne
    open-pull-requests-limit: 5
    versioning-strategy: increase
    labels:
      - dependencies
      - semver:patch
    commit-message:
      prefix: chore(deps)
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: Australia/Melbourne
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - semver:none
    commit-message:
      prefix: ci(deps)
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Australia/Melbourne
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - semver:patch
    commit-message:
      prefix: chore(container)

