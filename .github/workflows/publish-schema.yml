name: Publish schema package

on:
  push:
    tags:
      - "schema-v*.*.*"

permissions: {}

concurrency:
  group: publish-schema-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: verify and publish @teamem/schema
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out the release tag and full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Fetch main for ancestry verification
        run: git fetch --no-tags origin main:refs/remotes/origin/main

      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: "24"

      - name: Configure npm registry
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use an OIDC-capable npm CLI
        run: npm install --global npm@11.5.1

      - name: Verify tag, version, and main ancestry
        run: node .github/scripts/verify-schema-release.mjs '${{ github.ref_name }}'

      - name: Verify repository
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test

      - name: Pack release artifact
        run: |
          mkdir -p "${RUNNER_TEMP}/teamem-schema"
          pnpm --filter @teamem/schema pack \
            --pack-destination "${RUNNER_TEMP}/teamem-schema"

      - name: Smoke-test packed artifact
        run: |
          mkdir -p "${RUNNER_TEMP}/teamem-schema-consumer"
          cd "${RUNNER_TEMP}/teamem-schema-consumer"
          npm init --yes
          npm install "${RUNNER_TEMP}/teamem-schema/teamem-schema-${GITHUB_REF_NAME#schema-v}.tgz"
          node --input-type=module \
            --eval "import { CONTRACT_STATUS } from '@teamem/schema'; if (!CONTRACT_STATUS) process.exit(1)"

      - name: Publish packed artifact
        run: npm publish "${RUNNER_TEMP}/teamem-schema/teamem-schema-${GITHUB_REF_NAME#schema-v}.tgz" --access public
