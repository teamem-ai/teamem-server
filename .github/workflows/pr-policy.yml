name: PR policy

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-policy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  policy:
    name: required / pr-policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out trusted policy from the base branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false
      - name: Validate title and release label
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_LABELS_JSON: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: node .github/scripts/validate-pr.mjs
