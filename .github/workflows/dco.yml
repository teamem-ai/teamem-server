name: DCO

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: dco-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dco:
    name: required / dco
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out trusted DCO policy from the base branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: policy
          persist-credentials: false
      - name: Check out pull request history without executing it
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          path: source
          persist-credentials: false
      - name: Validate Developer Certificate of Origin sign-offs
        if: github.actor != 'dependabot[bot]'
        working-directory: source
        run: >-
          node ../policy/.github/scripts/check-dco.mjs
          '${{ github.event.pull_request.base.sha }}'
          '${{ github.event.pull_request.head.sha }}'
      - name: Record Dependabot DCO exemption
        if: github.actor == 'dependabot[bot]'
        run: echo 'Dependabot commits are generated by the configured repository integration.'
